<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxy Club | Join BDWorld - Trusted Online Platform</title>
    <meta name="description" content="Join Oxy Club on BDWorld. Fast deposit, withdrawal, and 24/7 admin support via IMO/WhatsApp. Start your journey today!">
    <meta name="keywords" content="Oxy Club, BDWorld, Login Bdworld, All Club Bdworld, Cricket bdworld Admin Online, Join BDWorld, 01826444505">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-bg: #002347;
            --accent-orange: #ff9800;
            --text-white: #ffffff;
            --admin-green: #00ff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Arial', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
        }

        /* Header Section */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background-color: var(--primary-bg);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .admin-status {
            display: flex;
            align-items: center;
            color: var(--text-white);
            font-weight: 600;
            font-size: 14px;
        }

        .admin-status i {
            color: var(--admin-green);
            margin-right: 8px;
            font-size: 10px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .logo img {
            height: 30px; /* Adjust height based on your logo */
            display: block;
        }

        /* Club Section */
        .hero-section {
            background: #fff;
            text-align: center;
            padding: 30px 20px;
            border-bottom: 2px solid #ddd;
        }

        .club-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-bg);
            margin-bottom: 15px;
        }

        .btn-join {
            display: inline-block;
            background: linear-gradient(135deg, #ff9800, #e65100);
            color: #fff;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .btn-join:active {
            transform: scale(0.95);
        }

        /* Contact Box */
        .contact-card {
            background: #f8f9fa;
            border: 1px dashed #002347;
            padding: 15px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .contact-card:hover {
            background: #eef2f7;
        }

        .icon-group {
            display: flex;
            gap: 8px;
            font-size: 22px;
        }

        .fa-whatsapp { color: #25D366; }
        .fa-comment-dots { color: #00AEEF; } /* Representative for IMO */

        .phone-number {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            letter-spacing: 1px;
        }

        .copy-hint {
            display: block;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        /* Screenshot Slider Area */
        .screenshot-area {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .screenshot-wrapper {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 4px solid #fff;
        }

        .screenshot-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Footer SEO Text */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .club-name { font-size: 24px; }
            .phone-number { font-size: 18px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="admin-status">
            <i class="fas fa-circle"></i> Admin Online
        </div>
        <div class="logo">
            <img src="bd2.png" alt="BDWorld Logo">
        </div>
    </header>

    <main>
        <section class="hero-section">
            <a href="https://bdworld.live" class="btn-join">Login Bdworld</a>
            <h1 class="club-name">Oxy Club</h1>
            
            <div class="contact-card" onclick="copyToClipboard()">
                <div class="icon-group">
                    <i class="fab fa-whatsapp"></i>
                    <i class="fas fa-comment-dots"></i>
                </div>
                <span class="phone-number" id="targetNum">01826444505</span>
                <i class="far fa-copy" style="color: #999;"></i>
            </div>
            <span class="copy-hint">কপি করতে নাম্বারের ওপর ক্লিক করুন</span>
        </section>

        <section class="screenshot-area">
            <div class="screenshot-wrapper">
                <img src="Slider.jpg" alt="BDWorld Oxy Club Screenshot">
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 Oxy Club - All Rights Reserved. <br>
        Optimized for SEO and Fast Loading.
    </footer>

    <script>
        function copyToClipboard() {
            const num = document.getElementById('targetNum').innerText;
            const el = document.createElement('textarea');
            el.value = num;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            alert('নাম্বারটি কপি হয়েছে: ' + num);
        }
    </script>

</body>
</html>
